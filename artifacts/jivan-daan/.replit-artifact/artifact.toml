kind = "web"
previewPath = "/"
title = "JIVAN DAAN - Blood Donation Platform"
version = "1.0.0"
id = "artifacts/jivan-daan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24625
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/jivan-daan run dev"

[services.env]
PORT = "24625"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/jivan-daan", "run", "build"]
publicDir = "artifacts/jivan-daan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
